<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: relative;
            background: white;
            padding: 40px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1b5e20;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #777;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2e7d5b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #25694d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 Glow Naturally</h1>
    <h2>Complete Your Profile</h2>
    <p>Help us personalize your skincare journey</p>

    <form method="POST">
        {% csrf_token %}

        <input type="number" name="age" placeholder="Age" value="{{ form.age.value|default:'' }}">

        <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" value="{{ form.weight.value|default:'' }}">

        <select name="skin_type">
            <option value="">Select Skin Type</option>
            <option value="oily">Oily</option>
            <option value="dry">Dry</option>
            <option value="combination">Combination</option>
            <option value="normal">Normal</option>
        </select>
        <button type="submit">Save Profile</button>
    </form>
</div>

</body>
</html>
